# Fixed Nexus IQ Server HA Helm Chart Values
# Addresses the hardcoded service account and PV issues

# Nexus IQ Server HA configuration
iq_server:
  image: "sonatype/nexus-iq-server"
  tag: "latest"
  imagePullPolicy: "Always"

  # Resources (matching official Helm chart production recommendations for m5d.2xlarge nodes - 8 vCPU per node)
  resources:
    requests:
      cpu: "4"      # 4 vCPU request (adjusted for node capacity)
      memory: "16Gi"
    limits:
      cpu: "6"      # 6 vCPU limit
      memory: "24Gi"

  # Java options (heap sized for 24Gi memory limit)
  javaOpts: "-Xms24g -Xmx24g -XX:+UseG1GC -Djava.util.prefs.userRoot=/sonatype-work/javaprefs"

  # Environment variables - matching ECS approach plus database config
  env:
    - name: NXIQ_DATABASE_MIGRATION
      value: "true"
    - name: CLUSTER_DIRECTORY
      value: "/sonatype-work/clm-cluster"
    - name: NEXUS_SECURITY_RANDOMPASSWORD
      value: "false"
    # Database environment variables for config.yml template
    - name: DB_HOSTNAME
      value: ""  # Will be set by script
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: "nexusiq"
    - name: DB_USERNAME
      value: "nexusiq"
    - name: DB_PASSWORD
      value: ""  # Will be set by script

  # License
  licenseSecret: "nexus-iq-license"

  # Database configuration - matching official chart structure
  database:
    hostname: ""  # Will be set by script
    port: 5432
    name: "nexusiq"
    username: "nexusiq"  # Keep our RDS username
    password: ""  # Will be set by script
    type: "postgresql"
    migration: true  # Enable database migration

  # Persistence - use existing PVC to skip PV creation entirely
  persistence:
    existingPersistentVolumeClaimName: "iq-server-pvc"

  # Let Helm create ServiceAccount with proper name
  serviceAccountName: "nexus-iq-sa"

  # Service configuration
  serviceType: "ClusterIP"

  # Replica count - matching ECS HA setup (minimum 2 for HA)
  # This value is overridden at runtime from terraform.tfvars (nexus_iq_replica_count)
  replicaCount: 3

  # HA Configuration matching ECS version - using Helm chart's config mechanism
  config:
    sonatypeWork: "/sonatype-work"
    clusterDirectory: "/sonatype-work/clm-cluster"
    createSampleData: true

    server:
      applicationConnectors:
        - type: http
          port: 8070
      adminConnectors:
        - type: http
          port: 8071
      # Enhanced request logging - matching Azure version
      requestLog:
        appenders:
          - type: file
            currentLogFilename: "/var/log/nexus-iq-server/request.log"
            archivedLogFilenamePattern: "/var/log/nexus-iq-server/request-%d.log.gz"
            archivedFileCount: 50

    # Enhanced logging configuration - matching Azure version
    logging:
      level: DEBUG
      loggers:
        com.sonatype.insight.scan: INFO
        eu.medsea.mimeutil.MimeUtil2: INFO
        org.apache.http: INFO
        org.apache.http.wire: ERROR
        org.eclipse.birt.report.engine.layout.pdf.font.FontConfigReader: WARN
        org.eclipse.jetty: INFO
        org.apache.shiro.web.filter.authc.BasicHttpAuthenticationFilter: INFO
        com.networknt.schema: false
        com.sonatype.insight.audit:
          appenders:
            - type: file
              currentLogFilename: "/var/log/nexus-iq-server/audit.log"
              archivedLogFilenamePattern: "/var/log/nexus-iq-server/audit-%d.log.gz"
              archivedFileCount: 50
        com.sonatype.insight.policy.violation:
          appenders:
            - type: file
              currentLogFilename: "/var/log/nexus-iq-server/policy-violation.log"
              archivedLogFilenamePattern: "/var/log/nexus-iq-server/policy-violation-%d.log.gz"
              archivedFileCount: 50
      appenders:
        - type: console
          threshold: DEBUG
          logFormat: "%d{'yyyy-MM-dd HH:mm:ss,SSSZ'} %level [%thread] %X{username} %logger - %msg%n"
        - type: file
          threshold: ALL
          currentLogFilename: "/var/log/nexus-iq-server/clm-server.log"
          archivedLogFilenamePattern: "/var/log/nexus-iq-server/clm-server-%d.log.gz"
          logFormat: "%d{'yyyy-MM-dd HH:mm:ss,SSSZ'} %level [%thread] %X{username} %logger - %msg%n"
          archivedFileCount: 50

# Service Account - let Helm manage it properly with IRSA for CloudWatch access
serviceAccount:
  create: true
  name: "nexus-iq-sa"
  annotations:
    eks.amazonaws.com/role-arn: ""  # Will be set by script from Terraform output

# CloudWatch Logging Configuration (top-level)
cloudwatch:
  enabled: true
  region: "us-east-1"  # Will be updated by script from Terraform
  logGroupName: "/eks/nexus-iq-ha/nexus-iq-server"
  logStreamName: "aggregator"

# Ingress configuration
ingress:
  enabled: true
  ingressClassName: "alb"
  annotations:
    alb.ingress.kubernetes.io/scheme: "internet-facing"
    alb.ingress.kubernetes.io/target-type: "ip"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: "/ping"

# Enable fluentd for CloudWatch logging (using chart's built-in configuration)
fluentd:
  enabled: true

  # Fluentd image - using bitnamilegacy
  image:
    repository: bitnamilegacy/fluentd
    tag: "1.17.1-debian-12-r4"
    pullPolicy: IfNotPresent

  # CloudWatch configuration (chart's built-in support)
  cloudwatch:
    enabled: true
    region: "us-east-1"  # Will be updated by script from Terraform
    logGroupName: "/eks/nexus-iq-ha/nexus-iq-server"
    logStreamPrefix: "pod/"

  # Resources for Fluentd sidecar
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

  # Fluentd aggregator configuration for EFS compatibility
  # EFS Access Points enforce UID/GID 1000, so run Fluentd as same user as IQ Server
  aggregator:
    enabled: true
    # Use the existing PVC for log storage
    persistence:
      existingPersistentVolumeClaimName: "nexus-iq-pvc"
    # Service account with IRSA for CloudWatch access
    serviceAccount:
      create: true
      annotations:
        eks.amazonaws.com/role-arn: ""  # Will be set by script from Terraform output
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      runAsNonRoot: true
    # Override init container to create directory instead of chown (EFS doesn't support chown)
    initContainers:
      - name: "{{ .Release.Name }}-set-fluentd-persistence-ownership"
        image: busybox:latest
        command: ["/bin/sh", "-c"]
        args: ["mkdir -p /opt/bitnami/fluentd/logs/nexus-iq-server && chmod 755 /opt/bitnami/fluentd/logs/nexus-iq-server"]
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        volumeMounts:
          - mountPath: "/opt/bitnami/fluentd/logs/nexus-iq-server"
            name: "iq-server-pod-volume"
            subPath: log

# Disable external-dns
external-dns:
  enabled: false

# Disable separate migration job (main pods handle migration)
migrationJob:
  enabled: false