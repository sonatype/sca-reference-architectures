



iq_server:
  image: "sonatype/nexus-iq-server"
  tag: "latest"
  imagePullPolicy: "Always"


  resources:
    requests:
      cpu: "4"
      memory: "16Gi"
    limits:
      cpu: "6"
      memory: "24Gi"


  javaOpts: "-Xms24g -Xmx24g -XX:+UseG1GC -Djava.util.prefs.userRoot=/sonatype-work/javaprefs"


  config:
    sonatypeWork: "/sonatype-work/clm-server"
    clusterDirectory: "/sonatype-work/clm-cluster"


  env:
    - name: NXIQ_DATABASE_MIGRATION
      value: "true"
    - name: CLUSTER_DIRECTORY
      value: "/sonatype-work/clm-cluster"
    - name: NEXUS_SECURITY_RANDOMPASSWORD
      value: "false"

    - name: DB_HOSTNAME
      value: ""
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: "nexusiq"
    - name: DB_USERNAME
      value: "nexusiq"
    - name: DB_PASSWORD
      value: ""


  licenseSecret: "nexus-iq-license"


  database:
    hostname: ""
    port: 5432
    name: "nexusiq"
    username: "nexusiq"
    password: ""
    type: "postgresql"
    migration: true


  persistence:


    existingPersistentVolumeName: " "
    persistentVolumeClaimName: "iq-server-pvc"
    size: "100Gi"
    storageClassName: "azurefile-nfs"
    accessModes:
      - ReadWriteMany


  securityContext:
    readOnlyRootFilesystem: false


  serviceAccountName: "nexus-iq-sa"


  serviceType: "LoadBalancer"
  serviceAnnotations:
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: "/ping"
    service.beta.kubernetes.io/azure-load-balancer-health-probe-protocol: "http"


  replicaCount: 3





  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - nexus-iq-server-ha
            topologyKey: "kubernetes.io/hostname"


  podDisruptionBudget:
    enabled: true
    minAvailable: 1


serviceAccount:
  create: true
  name: "nexus-iq-sa"
  annotations:

    azure.workload.identity/client-id: ""


ingress:
  enabled: false
  ingressClassName: "nginx"
  annotations:

    appgw.ingress.kubernetes.io/backend-path-prefix: "/"
    appgw.ingress.kubernetes.io/ssl-redirect: "false"
    appgw.ingress.kubernetes.io/connection-draining: "true"
    appgw.ingress.kubernetes.io/connection-draining-timeout: "30"
    appgw.ingress.kubernetes.io/request-timeout: "60"
    appgw.ingress.kubernetes.io/health-probe-path: "/ping"
    appgw.ingress.kubernetes.io/health-probe-interval: "30"
    appgw.ingress.kubernetes.io/health-probe-timeout: "30"
    appgw.ingress.kubernetes.io/health-probe-unhealthy-threshold: "3"
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls: []


autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80


fluentd:
  enabled: true


  image:
    repository: bitnamilegacy/fluentd
    tag: "1.17.1-debian-12-r4"
    pullPolicy: IfNotPresent


  azureMonitor:
    enabled: true
    workspaceId: ""
    logType: "nexus-iq-server"


  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

external-dns:
  enabled: false

migrationJob:
  enabled: false


azureFiles:
  enabled: true
  storageClass: "azure-files-premium-zrs"


livenessProbe:
  httpGet:
    path: /ping
    port: 8071
  initialDelaySeconds: 120
  periodSeconds: 60
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ping
    port: 8071
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3


monitoring:
  enabled: true
  applicationInsights:
    enabled: true
    instrumentationKey: ""
