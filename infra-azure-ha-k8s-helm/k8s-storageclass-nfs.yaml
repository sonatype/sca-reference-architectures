apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: azurefile-nfs
provisioner: file.csi.azure.com
allowVolumeExpansion: true
parameters:
  skuName: Premium_ZRS
  # Storage account and resource group will be set by setup script
  # storageAccount: stnexusiqhaiqha
  # resourceGroup: rg-nexus-iq-ha
  # Note: No protocol parameter = defaults to SMB/CIFS
mountOptions:
  - dir_mode=0777
  - file_mode=0777
  - uid=1000
  - gid=1000
  - mfsymlinks
  - cache=strict
  - actimeo=30
reclaimPolicy: Retain
volumeBindingMode: Immediate
