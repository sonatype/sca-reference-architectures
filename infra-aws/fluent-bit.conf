[SERVICE]
    Flush         5
    Grace         30
    Log_Level     ${FLB_LOG_LEVEL}
    Daemon        off
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    storage.path  /var/fluent-bit/state/flb-storage/
    storage.sync  normal
    storage.checksum off
    storage.max_chunks_up 128
    storage.backlog.mem_limit 5M

[INPUT]
    Name              tail
    Path              /var/log/nexus-iq-server/clm-server.log
    Tag               iq.application
    DB                /var/fluent-bit/state/clm-server.db
    Read_from_Head    true
    Refresh_Interval  10
    Skip_Long_Lines   On
    Buffer_Max_Size   256k
    Multiline         On
    Parser_Firstline  iq_application_firstline

[INPUT]
    Name              tail
    Path              /var/log/nexus-iq-server/request.log
    Tag               iq.request
    Parser            iq_request
    DB                /var/fluent-bit/state/request.db
    Read_from_Head    true
    Refresh_Interval  10
    Skip_Long_Lines   Off
    Buffer_Max_Size   256k

[INPUT]
    Name              tail
    Path              /var/log/nexus-iq-server/audit.log
    Tag               iq.audit
    Parser            json
    DB                /var/fluent-bit/state/audit.db
    Read_from_Head    true
    Refresh_Interval  10
    Buffer_Max_Size   256k

[INPUT]
    Name              tail
    Path              /var/log/nexus-iq-server/policy-violation.log
    Tag               iq.policy_violation
    Parser            json
    DB                /var/fluent-bit/state/policy-violation.db
    Read_from_Head    true
    Refresh_Interval  10
    Buffer_Max_Size   256k

[INPUT]
    Name              tail
    Path              /var/log/nexus-iq-server/stderr.log
    Tag               iq.stderr
    DB                /var/fluent-bit/state/stderr.db
    Read_from_Head    true
    Refresh_Interval  10
    Skip_Long_Lines   Off
    Buffer_Max_Size   256k

# Add ECS metadata and custom fields to all logs
[FILTER]
    Name                record_modifier
    Match               iq.*
    Record              ecs_cluster ${CLUSTER_NAME}
    Record              ecs_task_family ref-arch-nexus-iq-server
    Record              aws_region ${AWS_REGION}

# Add hostname from environment
[FILTER]
    Name                modify
    Match               iq.*
    Add                 hostname ${HOSTNAME}

# Output: Application logs to CloudWatch
[OUTPUT]
    Name                cloudwatch_logs
    Match               iq.application
    region              ${AWS_REGION}
    log_group_name      /ecs/ref-arch-nexus-iq-server/application
    log_stream_prefix   from-fluent-bit/
    auto_create_group   false
    retry_limit         2

# Output: Request logs to CloudWatch
[OUTPUT]
    Name                cloudwatch_logs
    Match               iq.request
    region              ${AWS_REGION}
    log_group_name      /ecs/ref-arch-nexus-iq-server/request
    log_stream_prefix   from-fluent-bit/
    auto_create_group   false
    retry_limit         2

# Output: Audit logs to CloudWatch
[OUTPUT]
    Name                cloudwatch_logs
    Match               iq.audit
    region              ${AWS_REGION}
    log_group_name      /ecs/ref-arch-nexus-iq-server/audit
    log_stream_prefix   from-fluent-bit/
    auto_create_group   false
    retry_limit         2

# Output: Policy violation logs to CloudWatch
[OUTPUT]
    Name                cloudwatch_logs
    Match               iq.policy_violation
    region              ${AWS_REGION}
    log_group_name      /ecs/ref-arch-nexus-iq-server/policy-violation
    log_stream_prefix   from-fluent-bit/
    auto_create_group   false
    retry_limit         2

# Output: stderr logs to CloudWatch
[OUTPUT]
    Name                cloudwatch_logs
    Match               iq.stderr
    region              ${AWS_REGION}
    log_group_name      /ecs/ref-arch-nexus-iq-server/stderr
    log_stream_prefix   from-fluent-bit/
    auto_create_group   false
    retry_limit         2
